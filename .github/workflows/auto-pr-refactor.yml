name: Auto PR for refactor branches

on:
  push:
    branches:
      - 'refactor/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR
        uses: offensive-vk/auto-pr-action@v8
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Automated refactor PR"
          source_branch: ${{ github.ref_name }}
          destination_branch: "epic/refactor-zustand-migration"
          labels: "automation,refactor"
          allow-empty: "false"
          draft: "false"
